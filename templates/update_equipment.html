<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Update Equipment</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="navbar">
        <a href="/">🔍 Search Farm Locations</a>
        <a href="/chaos">🗺️ Chaos Map</a>
        <a href="/equipment" class="active">⚔️ Equipment List</a>
    </div>

    <div class="container" style="max-width: 700px;">
        <h1>Update Equipment</h1>
        <div class="card">
            <p style="color: #aaa; margin-bottom: 20px;">Note: Changes made here will update the data for this item across all current Chaos maps.</p>

            <form action="/equipment/update" method="post" enctype="multipart/form-data">
                <input type="hidden" name="old_name" value="{{ item.name }}">
                <input type="hidden" name="current_img" value="{{ item.img }}">

                <label>Equipment Name:</label>
                <input type="text" name="name" value="{{ item.name }}" required>

                <label>Equipment Type:</label>
                <select name="type">
                    <option value="Weapon" {% if item.type == 'Weapon' %}selected{% endif %}>Weapon</option>
                    <option value="Armor" {% if item.type == 'Armor' %}selected{% endif %}>Armor</option>
                    <option value="Trinket" {% if item.type == 'Trinket' %}selected{% endif %}>Trinket</option>
                </select>

                <label>Item Level:</label>
                <select name="level">
                    <option value="Mythic" {% if item.level == 'Mythic' %}selected{% endif %}>Mythic</option>
                    <option value="Legend" {% if item.level == 'Legend' %}selected{% endif %}>Legend</option>
                    <option value="Rare" {% if item.level == 'Rare' %}selected{% endif %}>Rare</option>
                </select>

                <label>Current Image:</label>
                <div style="margin: 10px 0 15px 0;">
                    {% if item.img %}
                        <img src="{{ item.img }}" style="width: 100px; height: 100px; object-fit: cover; border-radius: 8px; border:1px solid #555; display:block;">
                    {% else %}
                        <p style="color:#777; font-size:14px; margin:0;">No image uploaded.</p>
                    {% endif %}
                </div>

                <label>Upload New Image:</label>
                <input type="file" name="img" accept="image/*" style="color: #fff; display: block; margin-top: 5px; margin-bottom: 20px;">

                <label>New Effect:</label>
                <textarea name="effect" rows="4" style="width:100%; background:#2d2d2d; color:white; padding:10px; border-radius:4px; border:1px solid #444; font-size:16px; font-family:inherit; resize:vertical;" required>{{ item.effect }}</textarea>

                <div style="margin-top: 20px;">
                    <button type="submit" class="btn btn-edit" style="padding: 12px 25px;">Update System</button>
                    <a href="/equipment" class="btn" style="background:#555; color:white; padding: 12px 25px; margin-left:10px;">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
